<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Sandy Pro — Smart Mining Classification{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='images/logo.svg') }}" type="image/svg+xml"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Sandy Pro" class="logo-img"/>
      <span class="brand-text">SANDY PRO</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="/" class="{% if request.endpoint == 'index' %}active{% endif %}">⛏ Classify</a></li>
      <li><a href="/dashboard" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">📊 Dashboard</a></li>
      <li><a href="/dataset" class="{% if request.endpoint == 'dataset' %}active{% endif %}">🗃 Dataset</a></li>
    </ul>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Sandy Pro &mdash; Smart Mining Classification &bull; Powered by Gemini 2.5 Pro &bull; &copy; 2025</p>
  </footer>

  {% block extra_js %}{% endblock %}
</body>
</html>
